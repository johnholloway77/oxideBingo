<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A silly page that generates bingo cards for Oxide and Friends">
  <meta name="author" content="John Holloway">
  <title>Oxide Bingo!!!</title>
  <link rel="icon" type="text/x-icon" href="/oxidebingo/favicon.ico">
  <style>
    body {
      background-color: #242930;
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      color: #afbac4;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header layout */
    header {
      width: 100%;
      padding: 1rem;
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      position: relative;
      flex-wrap: wrap;
      gap: 1rem;
    }

    h1 {
      color: #57cc8a; /* Oxide's greenish accent */
      font-family: 'IBM Plex Mono', 'Fira Mono', 'JetBrains Mono', 'Courier New', monospace;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    svg {
      color: #57cc8a;
      height: auto;
      width: 25%;
    }

    .blog-link {
      color: #48d597;
      text-decoration: none;
      font-weight: bold;
      order: -1;
    }

    .blog-link:hover {
      text-decoration: underline;
    }

    /* Centre and style the image */
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    img {
      max-width: 90%;
      height: auto;
      border: 1rem solid #48d597;
      box-sizing: border-box;
      margin-top: 1rem;
      border-radius: 25px;
    }

    /* Description text under the image */
    .description {
      text-align: center;
      margin: 2rem auto;
      max-width: 600px;
      padding: 0 1rem;
      color: #afbac4;
    }

    /* Mobile responsiveness */
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }

      img {
        border-width: 1rem;
      }

      .blog-link {
        order: -1;
        font-size: 0.95rem;
        width: 100%;
        text-align: center;
      }

      header {
        flex-direction: column;
        align-items: center;
      }
    }

  </style>

</head>
<body>
<header>
  <script>
    const start = performance.now();
    window.addEventListener('load', () => {
      const end = performance.now();
      console.log(`Client-side load time: ${Math.round(end - start)} ms`);
    });
  </script>
</header>

<main>


  <img src="/oxidebingo/bingocard" width="800" height="1214" alt="Bingo Card" loading="eager"
       fetchpriority="high">


  <div class="description">
    <p><strong>OxideBingo</strong> is a silly thing made for a laugh.</p>
    <p>Refresh the page for a new card.</p>
    <p>This is not made by <a href="https://oxide.computer">Oxide Computers</a> and does not reflect
      the views of the company.</p>
    <p>Come on, you know they're going to mention Dtrace so it's free...</p>
  </div>
</main>
</body>
</html>
